version: "3.8"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: notesdb
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"

  web:
    image: tejasachari04/notes-app:latest
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      DB_NAME: notesdb
      DB_USER: root
      DB_PASSWORD: root123
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      - db
      
